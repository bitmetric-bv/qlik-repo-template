name: PR Changelog & Docs Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

jobs:
  run-automation:
    # Roept de centrale workflow aan vanuit de automation-repo
    # Pas 'jouw-gebruikersnaam' aan naar je GitHub-gebruikersnaam of organisatienaam
    uses: bitmetric-bv/qlik-git-automation/.github/workflows/pr-changelog.yml@main
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
